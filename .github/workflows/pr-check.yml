name: PR 检查

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  python-sanity:
    name: Python 基础校验
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装最小依赖
        run: |
          python -m pip install --upgrade pip

      - name: 编译检查关键脚本
        run: |
          python -m py_compile OutlookRegister.py OutlookRegister_patchright.py get_token.py

      - name: 校验配置文件关键字段
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          required_keys = {
              "browser_path",
              "proxy",
              "Bot_protection_wait",
              "max_captcha_retries",
              "concurrent_flows",
              "max_tasks",
              "enable_oauth2",
              "client_id",
              "redirect_url",
              "Scopes",
          }

          config = json.loads(Path("config.json").read_text(encoding="utf-8"))
          missing = sorted(required_keys - set(config))
          assert not missing, f"config.json 缺少关键字段: {missing}"

          print("config.json schema smoke ok")
          PY
